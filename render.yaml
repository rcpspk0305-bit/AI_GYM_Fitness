services:
  - type: web
    name: ai-gym-backend
    env: python
    rootDir: ai_gym_backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GEMINI_API_KEY
        sync: false
      - key: CLOUDINARY_URL
        sync: false

  - type: web
    name: ai-gym-frontend
    env: static
    rootDir: ai_gym_frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ai-gym-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
